<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 Calendar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .calendar-table th { background-color: #f8f9fa; text-align: center; }
        .calendar-table td { text-align: center; height: 40px; vertical-align: middle; }
        .today { background-color: #0d6efd; color: white; border-radius: 50%; }
    </style>
</head>
<body class="bg-light">

<div class="container my-5">
    <h1 class="text-center mb-5">2026 Calendar</h1>
    
    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
        <div class="col">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white text-center fw-bold">January</div>
                <div class="card-body p-0">
                    <table class="table table-bordered mb-0 calendar-table">
                        <thead>
                            <tr>
                                <th>S</th><th>M</th><th>T</th><th>W</th><th>T</th><th>F</th><th>S</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td></td><td></td><td></td><td></td><td>1</td><td>2</td><td>3</td>
                            </tr>
                            <tr>
                                <td>4</td><td>5</td><td>6</td><td>7</td><td>8</td><td>9</td><td>10</td>
                            </tr>
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
        </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
